<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>마이페이지</title>
<link rel="stylesheet" href="/style.css"></head><body>
<div class="container" style="max-width:560px">
  <div class="card">
    <h1>마이페이지</h1>
    <div id="info" class="muted"></div>
  </div>
  <div class="card">
    <h2>소개글 수정</h2>
    <textarea id="bio" rows="3"></textarea>
    <button onclick="saveBio()">저장</button>
  </div>
  <div class="card">
    <h2>비밀번호 변경</h2>
    <input id="cur" type="password" placeholder="현재 비밀번호">
    <input id="npw" type="password" placeholder="새 비밀번호 (8자 이상, 영문+숫자)">
    <button onclick="savePw()">변경</button>
  </div>
  <div class="card">
    <h2>휴대폰 본인 인증 <span id="vstate" class="badge"></span></h2>
    <div class="row"><input id="phone" placeholder="01012345678"><button class="secondary" onclick="reqCode()">인증요청</button></div>
    <div class="row"><input id="code" placeholder="인증번호 6자리"><button onclick="verify()">확인</button></div>
    <p class="muted">※ 데모: 인증번호가 화면에 표시됩니다. 미인증 시 거래(구매/판매)가 불가합니다.</p>
  </div>
  <div class="card">
    <h2>활동 지역 인증 (GPS)</h2>
    <p class="muted" id="regionNow"></p>
    <input id="regionName" placeholder="동 이름 (예: 역삼동)">
    <button onclick="setLocation()">현재 위치로 인증</button>
  </div>
  <div id="msg" class="msg"></div>
</div>
<script src="/app.js"></script>
<script>
let me;
async function load() {
  me = await renderNav();
  if (!me) return location.href = '/login.html';
  document.getElementById('info').textContent = `${me.username} · 가입일 ${me.created_at} · 잔액 ${fmt(me.balance)}`;
  document.getElementById('bio').value = me.bio || '';
  const v = document.getElementById('vstate');
  v.textContent = me.verified ? '인증 완료' : '미인증';
  v.className = 'badge ' + (me.verified ? 'confirmed' : 'cancelled');
  document.getElementById('regionNow').textContent = '현재 지역: ' + (me.region || '미설정');
}
async function saveBio() {
  try { await api('/api/users/me', 'PATCH', { bio: document.getElementById('bio').value }); show('msg', '소개글이 저장되었습니다.', 'ok'); }
  catch (e) { show('msg', e.message); }
}
async function savePw() {
  try {
    await api('/api/users/me/password', 'PATCH', {
      currentPassword: document.getElementById('cur').value,
      newPassword: document.getElementById('npw').value });
    show('msg', '비밀번호가 변경되었습니다.', 'ok');
  } catch (e) { show('msg', e.message); }
}
async function reqCode() {
  try {
    const r = await api('/api/users/me/phone/request', 'POST', { phone: document.getElementById('phone').value });
    show('msg', '인증번호(데모): ' + r.demoCode, 'ok');
  } catch (e) { show('msg', e.message); }
}
async function verify() {
  try {
    await api('/api/users/me/phone/verify', 'POST', { code: document.getElementById('code').value });
    show('msg', '본인 인증이 완료되었습니다.', 'ok'); load();
  } catch (e) { show('msg', e.message); }
}
function setLocation() {
  const region = document.getElementById('regionName').value;
  if (!region) return show('msg', '동 이름을 입력해주세요.');
  if (!navigator.geolocation) return show('msg', '이 브라우저는 GPS를 지원하지 않습니다.');
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      await api('/api/users/me/location', 'POST', { lat: pos.coords.latitude, lng: pos.coords.longitude, region });
      show('msg', '활동 지역이 인증되었습니다: ' + region, 'ok'); load();
    } catch (e) { show('msg', e.message); }
  }, () => show('msg', '위치 권한이 거부되었습니다.'));
}
load();
</script></body></html>
